<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Angebotsrechner</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --acc: #4a7c59;
  --acc-light: #e8f0eb;
  --acc-border: #c5dac9;
  --acc-dark: #2d5c3a;
  --acc-mid: #3d6b4a;
  --surface: #ffffff;
  --text: #1c1c1a;
  --text-muted: #6b6b65;
  --text-hint: #9b9b93;
  --border: rgba(0,0,0,0.1);
  --border-med: rgba(0,0,0,0.18);
  --radius: 10px;
  --radius-lg: 14px;
}

html { overflow-x: hidden; width: 100%; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: transparent;
  color: var(--text);
  padding: 1rem;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

.page {
  max-width: 900px;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 340px;
  column-gap: 1rem;
  align-items: start;
}

.page > .card,
.page > #extras-section { grid-column: 1; }

.page > .result-card {
  grid-column: 2;
  grid-row: 1 / 99;
  position: sticky;
  top: 0;
}

@media (max-width: 780px) {
  .page { grid-template-columns: 1fr; }
  .page > .result-card { grid-column: 1; grid-row: auto; position: static; }
}

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  margin-bottom: 1rem;
}

.card-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--acc);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 5px;
}

input[type="date"],
input[type="number"] {
  height: 38px;
  padding: 0 11px;
  border: 0.5px solid var(--border-med);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'Source Sans 3', sans-serif;
  color: var(--text);
  background: var(--surface);
  width: 100%;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}

input[type="date"]:focus,
input[type="number"]:focus {
  outline: none;
  border-color: var(--acc);
  box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
}

input[type="number"] { width: 72px; }

.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.persons-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text);
  padding: 7px 0;
  cursor: pointer;
  user-select: none;
}

.checkbox-label input[type="checkbox"] {
  width: 17px;
  height: 17px;
  accent-color: var(--acc);
  cursor: pointer;
  flex-shrink: 0;
}

.mandatory-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text-muted);
  padding: 7px 0;
}

.mandatory-row input[type="checkbox"] {
  width: 17px;
  height: 17px;
  flex-shrink: 0;
  opacity: 0.4;
}

.badge {
  font-size: 11px;
  padding: 2px 7px;
  background: var(--acc-light);
  color: var(--acc-dark);
  border-radius: 6px;
  font-weight: 500;
}

.hint {
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 6px;
}

.error-msg {
  font-size: 13px;
  color: #c0392b;
  margin-top: 5px;
}

.result-card {
  background: var(--acc-light);
  border: 0.5px solid var(--acc-border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}

.result-card .card-title { color: var(--acc-mid); }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 14px;
  color: var(--text-muted);
  padding: 5px 0;
}

.result-row.discount { color: var(--acc-mid); font-weight: 500; }

.result-row.total {
  font-size: 20px;
  font-weight: 500;
  font-family: 'Lora', serif;
  color: var(--acc-dark);
  border-top: 0.5px solid var(--acc-border);
  margin-top: 10px;
  padding-top: 12px;
}

.result-row.info-row {
  font-size: 12px;
  color: var(--text-hint);
  font-style: italic;
}

.divider { height: 0.5px; background: var(--acc-border); margin: 6px 0; }

.contact-buttons {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.contact-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 9px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
  flex: 1;
  white-space: nowrap;
}

.contact-btn:hover { opacity: 0.85; }
.btn-whatsapp { background: #25d366; color: #fff; }
.btn-mail     { background: var(--acc); color: #fff; }

@media (max-width: 400px) {
  .persons-grid { grid-template-columns: 1fr 1fr; }
  .contact-buttons { flex-direction: column; }
}
</style>
</head>
<body>
<div class="page">

  <div class="card">
    <div class="card-title">Zeitraum</div>
    <div class="date-row">
      <div class="field">
        <label>Anreise</label>
        <input type="date" id="anreise">
      </div>
      <div class="field">
        <label>Abreise</label>
        <input type="date" id="abreise">
      </div>
    </div>
    <div id="datum-error" class="error-msg" style="display:none"></div>
    <div id="nacht-info" class="hint"></div>
  </div>

  <div class="card">
    <div class="card-title">Personen</div>
    <div class="persons-grid">
      <div class="field">
        <label>Erwachsene</label>
        <input type="number" id="erwachsene" value="1" min="1" max="10">
      </div>
      <div class="field">
        <label>Kinder ab 7 J.</label>
        <input type="number" id="kinderAb7" value="0" min="0" max="10">
      </div>
      <div class="field">
        <label>Kinder unter 7 J.</label>
        <input type="number" id="kinderUnter7" value="0" min="0" max="10">
      </div>
    </div>
  </div>

  <div id="extras-section" class="card">
    <div class="card-title">Extras</div>
    <label class="checkbox-label">
      <input type="checkbox" id="bettwasche" checked>
      Bettwäsche &amp; Handtücher (+10 €)
    </label>
    <div class="mandatory-row">
      <input type="checkbox" checked disabled>
      <span>Endreinigung &amp; Nebenkosten (+20 €) <span class="badge">Pflicht</span></span>
    </div>
  </div>

  <div class="result-card">
    <div class="card-title">Kostenübersicht</div>
    <div id="result-rows"></div>
    <div class="contact-buttons">
      <a id="btn-whatsapp" class="contact-btn btn-whatsapp" href="#" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </a>
      <a id="btn-mail" class="contact-btn btn-mail" href="#" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        E-Mail
      </a>
    </div>
  </div>

</div>
<script>
const _O = 7;
const _d = arr => arr.map(c => String.fromCharCode(c - _O)).join('');
const WHATSAPP_NUMBER = _d([59,64,56,62,62,64,62,59,57,56,57,56]);
const MAIL_ADDRESS    = _d([109,108,126,118,111,124,108,117,127,108,71,110,116,104,112,115,53,106,118,116]);

// Lagrange interpolation through 4 control points (nights → netto without extras)
// Targets: 7→370, 14→570, 21→700, 28→820 (excl. 30€ extras)
// For nights > 28 the discount ratio of night 28 is applied statically.
const CURVE_POINTS = [[7, 370], [14, 570], [21, 700], [28, 820]];

function lagrangeDiscount(nights) {
  const n = Math.min(nights, 28);
  let result = 0;
  for (let i = 0; i < CURVE_POINTS.length; i++) {
    let term = CURVE_POINTS[i][1];
    for (let j = 0; j < CURVE_POINTS.length; j++) {
      if (i !== j) term *= (n - CURVE_POINTS[j][0]) / (CURVE_POINTS[i][0] - CURVE_POINTS[j][0]);
    }
    result += term;
  }
  return Math.round(result);
}

const fmtEur = v => v.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });

function isWeekend(d) { const w = d.getDay(); return w === 5 || w === 6 || w === 0; }

function countNights(von, bis) {
  let wt = 0, we = 0, cur = new Date(von);
  while (cur < bis) { isWeekend(cur) ? we++ : wt++; cur.setDate(cur.getDate() + 1); }
  return { wt, we, total: wt + we };
}

function renderRows(rows) {
  return rows.map(r => {
    if (r.divider) return '<div class="divider"></div>';
    const cls = ['result-row', r.discount && 'discount', r.total && 'total', r.info && 'info-row']
      .filter(Boolean).join(' ');
    return `<div class="${cls}"><span>${r.label}</span><span>${r.val}</span></div>`;
  }).join('');
}

function buildMessage(nächte, von, bis, erw, kAb7, kUnter7, total) {
  const fmt = d => d.toLocaleDateString('de-DE');
  const personen = [
    `${erw} Erwachsene`,
    kAb7    > 0 ? `${kAb7} Kind${kAb7 > 1 ? 'er' : ''} ab 7 J.`         : null,
    kUnter7 > 0 ? `${kUnter7} Kind${kUnter7 > 1 ? 'er' : ''} unter 7 J.` : null,
  ].filter(Boolean).join(', ');

  return [
    'Hallo, ich interessiere mich für eine Buchung:',
    '',
    `Anreise:  ${fmt(von)}`,
    `Abreise:  ${fmt(bis)}`,
    `Nächte:   ${nächte}`,
    `Personen: ${personen}`,
    '',
    `Berechneter Gesamtbetrag: ${fmtEur(total)}`,
    '',
    'Bitte um Bestätigung der Verfügbarkeit. Vielen Dank!',
  ].filter(l => l !== null).join('\n');
}

function updateContactButtons(nächte, von, bis, erw, kAb7, kUnter7, total) {
  const msg  = buildMessage(nächte, von, bis, erw, kAb7, kUnter7, total);
  const subj = `Buchungsanfrage Ferienwohnung Hünxe – ${von.toLocaleDateString('de-DE')} bis ${bis.toLocaleDateString('de-DE')}`;
  document.getElementById('btn-whatsapp').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  document.getElementById('btn-mail').href     = `mailto:${MAIL_ADDRESS}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(msg)}`;
}

function calc() {
  const an = document.getElementById('anreise').value;
  const ab = document.getElementById('abreise').value;
  const errEl  = document.getElementById('datum-error');
  const infoEl = document.getElementById('nacht-info');
  const rows   = [];

  if (!an || !ab) {
    document.getElementById('result-rows').innerHTML = renderRows([{ label: 'Bitte Zeitraum wählen.', val: '' }]);
    infoEl.textContent = '';
    return;
  }

  const von = new Date(an), bis = new Date(ab);

  if (bis <= von) {
    errEl.textContent = 'Abreise muss nach Anreise liegen.';
    errEl.style.display = 'block';
    document.getElementById('result-rows').innerHTML = '';
    infoEl.textContent = '';
    return;
  }
  errEl.style.display = 'none';

  const { wt, we, total: nächte } = countNights(von, bis);
  const erw     = Math.max(1, parseInt(document.getElementById('erwachsene').value)    || 1);
  const kAb7    = Math.max(0, parseInt(document.getElementById('kinderAb7').value)     || 0);
  const kUnter7 = Math.max(0, parseInt(document.getElementById('kinderUnter7').value)  || 0);

  // Always show extras
  document.getElementById('extras-section').style.display = 'block';
  infoEl.textContent = `${nächte} Nacht${nächte !== 1 ? 'e' : ''} (${wt} Wochentag${wt !== 1 ? 'e' : ''}, ${we} Wochenend-Nacht${we !== 1 ? 'e' : ''})`;

  const gesPers       = erw + kAb7;
  const weitere       = Math.max(0, gesPers - 2);
  const extraProNacht = weitere * 15 + kUnter7 * 7.5;
  const wtP    = 60 + extraProNacht;
  const weP    = 75 + extraProNacht;
  const brutto = wt * wtP + we * weP;

  if (wt > 0) rows.push({ label: `${wt} × Wochentag-Nacht`, val: fmtEur(wt * wtP) });
  if (we > 0) rows.push({ label: `${we} × Wochenend-Nacht`, val: fmtEur(we * weP) });

  let unterkunft = brutto;

  if (nächte >= 7) {
    // Derive discount ratio from the curve, capped at night 28.
    // Use actual wt/we split scaled to the capped night count as reference base.
    const cappedN    = Math.min(nächte, 28);
    const scale      = cappedN / nächte;
    const refBase    = Math.round((wt * scale) * 60 + (we * scale) * 75);
    const nettoBase  = lagrangeDiscount(cappedN);
    const ratio      = nettoBase / refBase;
    unterkunft       = Math.round(brutto * ratio);
    const rabatt     = brutto - unterkunft;
    const pct        = Math.round((1 - ratio) * 1000) / 10;
    rows.push({ label: `Rabattstaffel (${pct} %)`, val: `−${fmtEur(rabatt)}`, discount: true });
    rows.push({ label: 'Unterkunft nach Rabatt', val: fmtEur(unterkunft) });
  }

  const bett = document.getElementById('bettwasche').checked ? 10 : 0;
  if (bett) rows.push({ label: 'Bettwäsche & Handtücher', val: fmtEur(bett) });
  rows.push({ label: 'Endreinigung & Nebenkosten', val: fmtEur(20) });

  rows.push({ divider: true });

  const total = unterkunft + bett + 20;
  rows.push({ label: 'Gesamt', val: fmtEur(total), total: true });
  document.getElementById('result-rows').innerHTML = renderRows(rows);
  updateContactButtons(nächte, von, bis, erw, kAb7, kUnter7, total);
}

['anreise', 'abreise', 'erwachsene', 'kinderAb7', 'kinderUnter7'].forEach(id => {
  document.getElementById(id).addEventListener('input', calc);
});
document.getElementById('bettwasche').addEventListener('change', calc);

const today = new Date().toISOString().split('T')[0];
document.getElementById('anreise').value = today;
const tom = new Date(); tom.setDate(tom.getDate() + 1);
document.getElementById('abreise').value = tom.toISOString().split('T')[0];
calc();
</script>
</body>
</html>
