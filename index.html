<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Angebotsrechner</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --acc: #4a7c59; --acc-light: #e8f0eb; --acc-border: #c5dac9;
  --acc-dark: #2d5c3a; --acc-mid: #3d6b4a;
  --surface: #ffffff; --text: #1c1c1a; --text-muted: #6b6b65;
  --text-hint: #9b9b93; --border: rgba(0,0,0,0.1); --border-med: rgba(0,0,0,0.18);
  --radius: 10px; --radius-lg: 14px;
}
body { font-family: 'Source Sans 3', sans-serif; background: transparent; color: var(--text); padding: 0 1rem 1.5rem; display: flex; justify-content: center; }
.page { width: 100%; max-width: 560px; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 11px; font-weight: 500; color: var(--acc); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
.field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
input[type="date"], input[type="number"] {
  height: 38px; padding: 0 11px; border: 0.5px solid var(--border-med);
  border-radius: var(--radius); font-size: 14px; font-family: 'Source Sans 3', sans-serif;
  color: var(--text); background: var(--surface); width: 100%; transition: border-color 0.15s; -webkit-appearance: none;
}
input[type="date"]:focus, input[type="number"]:focus { outline: none; border-color: var(--acc); box-shadow: 0 0 0 3px rgba(74,124,89,0.12); }
input[type="number"] { width: 72px; }
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.persons-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.checkbox-label { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text); padding: 7px 0; cursor: pointer; user-select: none; }
.checkbox-label input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--acc); cursor: pointer; flex-shrink: 0; }
.mandatory-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-muted); padding: 7px 0; }
.mandatory-row input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.4; }
.badge { font-size: 11px; padding: 2px 7px; background: var(--acc-light); color: var(--acc-dark); border-radius: 6px; font-weight: 500; }
.hint { font-size: 12px; color: var(--text-hint); margin-top: 6px; }
.error-msg { font-size: 13px; color: #c0392b; margin-top: 5px; }
.result-card { background: var(--acc-light); border: 0.5px solid var(--acc-border); border-radius: var(--radius-lg); padding: 1.25rem; }
.result-card .card-title { color: var(--acc-mid); }
.result-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 14px; color: var(--text-muted); padding: 5px 0; }
.result-row.discount { color: var(--acc-mid); font-weight: 500; }
.result-row.total { font-size: 20px; font-weight: 500; font-family: 'Lora', serif; color: var(--acc-dark); border-top: 0.5px solid var(--acc-border); margin-top: 10px; padding-top: 12px; }
.divider { height: 0.5px; background: var(--acc-border); margin: 6px 0; }
@media (max-width: 400px) { .persons-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="page">

  <div class="card">
    <div class="card-title">Zeitraum</div>
    <div class="date-row">
      <div class="field"><label>Anreise</label><input type="date" id="anreise"></div>
      <div class="field"><label>Abreise</label><input type="date" id="abreise"></div>
    </div>
    <div id="datum-error" class="error-msg" style="display:none"></div>
    <div id="nacht-info" class="hint"></div>
  </div>

  <div class="card" id="personen-card">
    <div class="card-title">Personen</div>
    <div class="persons-grid">
      <div class="field"><label>Erwachsene</label><input type="number" id="erwachsene" value="1" min="1" max="10"></div>
      <div class="field"><label>Kinder ab 7 J.</label><input type="number" id="kinderAb7" value="0" min="0" max="10"></div>
      <div class="field"><label>Kinder unter 7 J.</label><input type="number" id="kinderUnter7" value="0" min="0" max="10"></div>
    </div>
  </div>

  <div class="card" id="extras-card">
    <div class="card-title">Extras</div>
    <label class="checkbox-label">
      <input type="checkbox" id="bettwasche" checked> Bettwäsche &amp; Handtücher (+10 €)
    </label>
    <div class="mandatory-row">
      <input type="checkbox" checked disabled>
      <span>Endreinigung &amp; Nebenkosten (+20 €) <span class="badge">Pflicht</span></span>
    </div>
  </div>

  <div class="result-card">
    <div class="card-title">Kostenübersicht</div>
    <div id="result-rows"></div>
  </div>

</div>
<script>
const EXTRAS = 30;
const CURVE  = [[7,370],[14,570],[21,700],[28,820]];

function lagrange(n) {
  const x = Math.min(n, 28);
  let r = 0;
  for (let i = 0; i < CURVE.length; i++) {
    let t = CURVE[i][1];
    for (let j = 0; j < CURVE.length; j++) {
      if (i !== j) t *= (x - CURVE[j][0]) / (CURVE[i][0] - CURVE[j][0]);
    }
    r += t;
  }
  return Math.round(r);
}

function isWeekend(d) { const w = d.getDay(); return w === 5 || w === 6 || w === 0; }

function countNights(von, bis) {
  let wt = 0, we = 0, cur = new Date(von);
  while (cur < bis) { isWeekend(cur) ? we++ : wt++; cur.setDate(cur.getDate() + 1); }
  return { wt, we, total: wt + we };
}

// Netto-Preis für n Nächte ab einem Startdatum (ohne Extras, ohne Personenaufschlag)
function nettoBase(startDate, n) {
  let raw = 0, wt = 0, we = 0;
  const cur = new Date(startDate);
  for (let i = 0; i < n; i++) {
    if (isWeekend(cur)) { raw += 75; we++; } else { raw += 60; wt++; }
    cur.setDate(cur.getDate() + 1);
  }
  return { raw, wt, we };
}

// Variante D Algorithmus
function calcVarianteD(startDate, nächte, extraProNacht) {
  const n = nächte;

  // Roher Unterkunftspreis inkl. Personenaufschlag
  let rawTotal = 0;
  const cur = new Date(startDate);
  for (let i = 0; i < n; i++) {
    rawTotal += (isWeekend(cur) ? 75 : 60) + extraProNacht;
    cur.setDate(cur.getDate() + 1);
  }

  if (n < 7) return rawTotal;

  // Lagrange-Ratio für n >= 15 (originaler Algorithmus)
  function lagrangeNet(nn) {
    const b = nettoBase(startDate, nn);
    const cn = Math.min(nn, 28), scale = cn / nn;
    const refBase = Math.round(b.wt * scale * 60 + b.we * scale * 75);
    return Math.round(b.raw * lagrange(cn) / refBase);
  }

  // N6 netto (ohne Personenaufschlag, der wird separat addiert)
  const base6 = nettoBase(startDate, 6);
  const net6  = base6.raw;
  const net7  = net6;                 // N7 = gratis, identisch zu N6
  const net14 = lagrangeNet(14);      // Lagrange-Ziel bei N14

  // Personenaufschlag netto für n Nächte
  const extraTotal = extraProNacht * n;

  if (n === 7) {
    // Unterkunft netto = net7, Personenaufschlag für 7 Nächte
    const extraN7 = extraProNacht * 7;
    return net7 + extraN7;
  }

  if (n <= 14) {
    // Linear zwischen net7 (anchor) und net14
    const t = (n - 7) / (14 - 7);
    const unterkunftNetto = Math.round(net7 + t * (net14 - net7));
    // Personenaufschlag: auch interpolieren damit kein Sprung
    return unterkunftNetto + extraTotal;
  }

  // N15+: originaler Lagrange-Algorithmus
  const b = nettoBase(startDate, n);
  const cn = Math.min(n, 28), scale = cn / n;
  const refBase = Math.round(b.wt * scale * 60 + b.we * scale * 75);
  const ratio = lagrange(cn) / refBase;
  return Math.round(b.raw * ratio) + extraTotal;
}

const fmtEur = v => v.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });

function renderRows(rows) {
  return rows.map(r => {
    if (r.divider) return '<div class="divider"></div>';
    const cls = r.discount ? 'result-row discount' : r.total ? 'result-row total' : 'result-row';
    return `<div class="${cls}"><span>${r.label}</span><span>${r.val}</span></div>`;
  }).join('');
}

function calc() {
  const an = document.getElementById('anreise').value;
  const ab = document.getElementById('abreise').value;
  const errEl  = document.getElementById('datum-error');
  const infoEl = document.getElementById('nacht-info');
  const rows = [];

  if (!an || !ab) {
    document.getElementById('result-rows').innerHTML = renderRows([{ label: 'Bitte Zeitraum wählen.', val: '' }]);
    return;
  }

  const von = new Date(an), bis = new Date(ab);
  if (bis <= von) {
    errEl.textContent = 'Abreise muss nach Anreise liegen.';
    errEl.style.display = 'block';
    document.getElementById('result-rows').innerHTML = '';
    infoEl.textContent = '';
    return;
  }
  errEl.style.display = 'none';

  const { wt, we, total: nächte } = countNights(von, bis);
  infoEl.textContent = `${nächte} Nacht${nächte !== 1 ? 'e' : ''} (${wt} Wochentag${wt !== 1 ? 'e' : ''}, ${we} Wochenend-Nacht${we !== 1 ? 'e' : ''})`;

  // Ab 30 Nächten → Langzeitmiete
  if (nächte >= 30) {
    document.getElementById('personen-card').style.display = 'none';
    document.getElementById('extras-card').style.display   = 'none';
    const ganzeMonate = Math.floor(nächte / 30);
    const restTage    = nächte % 30;
    const gesamt      = ganzeMonate * 850 + restTage * (850 / 30);
    if (ganzeMonate > 0) rows.push({ label: `${ganzeMonate} Monat${ganzeMonate > 1 ? 'e' : ''} × 850,00 €`, val: fmtEur(ganzeMonate * 850) });
    if (restTage > 0)    rows.push({ label: `${restTage} Tag${restTage > 1 ? 'e' : ''} anteilig`, val: fmtEur(restTage * (850 / 30)) });
    rows.push({ divider: true });
    rows.push({ label: 'Gesamt', val: fmtEur(gesamt), total: true });
    document.getElementById('result-rows').innerHTML = renderRows(rows);
    return;
  }

  document.getElementById('personen-card').style.display = 'block';
  document.getElementById('extras-card').style.display   = 'block';

  const erw     = Math.max(1, parseInt(document.getElementById('erwachsene').value) || 1);
  const kAb7    = Math.max(0, parseInt(document.getElementById('kinderAb7').value) || 0);
  const kUnter7 = Math.max(0, parseInt(document.getElementById('kinderUnter7').value) || 0);

  const gesPers = erw + kAb7;
  const weitere = Math.max(0, gesPers - 2);
  const extraProNacht = weitere * 15 + kUnter7 * 7.5;

  // Brutto ohne Rabatt (für Anzeige)
  let bruttoRaw = 0;
  const cur = new Date(von);
  for (let i = 0; i < nächte; i++) {
    bruttoRaw += (isWeekend(cur) ? 75 : 60) + extraProNacht;
    cur.setDate(cur.getDate() + 1);
  }

  const unterkunft = calcVarianteD(von, nächte, extraProNacht);

  if (wt > 0 && we > 0) {
    // Zeige Aufschlüsselung nur wenn gemischt
    const wtRaw = wt * (60 + extraProNacht);
    const weRaw = we * (75 + extraProNacht);
    rows.push({ label: `${wt} × Wochentag-Nacht`, val: fmtEur(wtRaw) });
    rows.push({ label: `${we} × Wochenend-Nacht`, val: fmtEur(weRaw) });
  } else if (wt > 0) {
    rows.push({ label: `${wt} × Wochentag-Nacht`, val: fmtEur(wt * (60 + extraProNacht)) });
  } else {
    rows.push({ label: `${we} × Wochenend-Nacht`, val: fmtEur(we * (75 + extraProNacht)) });
  }

  if (nächte >= 7) {
    const rabatt = bruttoRaw - unterkunft;
    const pct = Math.round((rabatt / bruttoRaw) * 100);
    if (rabatt > 0) {
      rows.push({ label: `Rabatt (${pct} %)`, val: `−${fmtEur(rabatt)}`, discount: true });
      rows.push({ label: 'Unterkunft nach Rabatt', val: fmtEur(unterkunft) });
    }
  }

  const bett = document.getElementById('bettwasche').checked ? 10 : 0;
  if (bett) rows.push({ label: 'Bettwäsche & Handtücher', val: fmtEur(bett) });
  rows.push({ label: 'Endreinigung & Nebenkosten', val: fmtEur(20) });
  rows.push({ divider: true });
  rows.push({ label: 'Gesamt', val: fmtEur(unterkunft + bett + 20), total: true });

  document.getElementById('result-rows').innerHTML = renderRows(rows);
}

['anreise', 'abreise', 'erwachsene', 'kinderAb7', 'kinderUnter7'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', calc);
});
document.getElementById('bettwasche').addEventListener('change', calc);

const today = new Date().toISOString().split('T')[0];
document.getElementById('anreise').value = today;
const tom = new Date(); tom.setDate(tom.getDate() + 1);
document.getElementById('abreise').value = tom.toISOString().split('T')[0];
calc();
</script>
</body>
</html>
